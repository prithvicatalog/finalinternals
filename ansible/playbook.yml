- name: Deploy to Tomcat
  hosts: web
  become: yes
  tasks:
    - name: Copy WAR file to Tomcat
      copy:
        src: "/var/snap/jenkins/5022/workspace/finalinternals/target/MavenAnsible.war"
        dest: "/opt/tomcat/webapps/MavenAnsible.war"
        remote_src: no

    - name: Restart Tomcat
      shell: /opt/tomcat/bin/shutdown.sh && /opt/tomcat/bin/startup.sh
